<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60">
  <!-- Asanoha (hemp leaf) inspired geometric tile — repeats seamlessly -->
  <g fill="none" stroke="currentColor" stroke-width="0.6" stroke-linecap="round">
    <!-- Outer hexagon -->
    <polygon points="30,2 55,16 55,44 30,58 5,44 5,16" />
    <!-- Six inner triangles (star spokes) -->
    <line x1="30" y1="2"  x2="30" y2="30" />
    <line x1="55" y1="16" x2="30" y2="30" />
    <line x1="55" y1="44" x2="30" y2="30" />
    <line x1="30" y1="58" x2="30" y2="30" />
    <line x1="5"  y1="44" x2="30" y2="30" />
    <line x1="5"  y1="16" x2="30" y2="30" />
    <!-- Inner hexagon -->
    <polygon points="30,16 42,23 42,37 30,44 18,37 18,23" />
  </g>
</svg>
